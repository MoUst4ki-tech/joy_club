<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Club - Accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-layout">
            <div class="title-group">
                <h1>Le Joy Club</h1>
                <p>Ici, perdez ou gagnez à votre guise.</p>
            </div>
            <div class="wallet-card header-wallet">
                <span class="wallet-label">Wallet :</span>
                <span id="gold-eggs-display" class="wallet-value">100</span>
                <span class="wallet-unit">🥚</span>
                <button onclick="rechargerFonds()" class="btn-sos">SOS 🏦</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h2>Nos jeux de hasard</h2>
        </section>
        
        <div class="games-grid">
            <section class="game-card">
                <div class="game-header">
                    <span class="game-badge">Jeu 1</span>
                    <h3>Le Lancer de Dés</h3>
                </div>
                <a href="jeu-des.html" class="game-link-portal">
                    <div class="game-viewport">
                        <span class="icon-large">🎲</span>
                        <p class="play-label">Cliquer pour jouer</p>
                    </div>
                </a>
            </section>

            <section class="game-card">
                <div class="game-header">
                    <span class="game-badge">Jeu 2</span>
                    <h3>La Roulette</h3>
                </div>
                <a href="roulette.html" class="game-link-portal">
                    <div class="game-viewport">
                        <span class="icon-large">🎰</span>
                        <p class="play-label">Cliquer pour jouer</p>
                    </div>
                </a>
            </section>

            <section class="game-card">
                <div class="game-header">
                    <span class="game-badge">Jeu 3</span>
                    <h3>Course de Poulets</h3>
                </div>
                <a href="course-poulets.html" class="game-link-portal">
                    <div class="game-viewport">
                        <span class="icon-large">🐔</span>
                        <p class="play-label">Cliquer pour jouer</p>
                    </div>
                </a>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Équipe Joy Club</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
