<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard Serveur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tableau de Bord Personnel</h1>
        <p>Statut du Raspberry Pi 4B</p>
    </header>

    <main>
        <section class="card">
            <h2>Informations Matériel</h2>
            <ul>
                <li><strong>Modèle :</strong> Raspberry Pi 4 Model B</li>
                <li><strong>Stockage :</strong> HDD 1 To connecté</li>
                <li><strong>État :</strong> En ligne</li>
            </ul>
        </section>

        <section class="card">
            <h2>Services Actifs</h2>
            <div class="status-grid">
                <div class="status-item">Stockage Cloud (Nextcloud)</div>
                <div class="status-item">Serveur Media (Plex)</div>
                <div class="status-item">Sauvegarde Auto</div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Gestion de mon infrastructure privée</p>
    </footer>
</body>
</html>
