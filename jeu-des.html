<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dés - Joy Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-layout">
            <div class="title-group">
                <h1>🎲 Le Lancer de Dés</h1>
                <a href="index.html" class="back-link">← Retour au Club</a>
            </div>
            <div class="wallet-card header-wallet">
                <span class="wallet-label">Wallet :</span>
                <span id="gold-eggs-display" class="wallet-value">100</span>
                <span class="wallet-unit">🥚</span>
                <button onclick="rechargerFonds()" class="btn-sos">SOS 🏦</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container-focus">
            <h2>Tente ta chance !</h2>
            <p>Fais un <strong>6</strong> pour gagner 6x ta mise !</p>
            
            <div class="input-group">
                <label for="mise-de">Ta mise (🥚) :</label>
                <input type="number" id="mise-de" min="1" value="10">
            </div>
            
            <div id="resultat-de" class="dice-display">❓</div>
            
            <button id="btn-lancer-de" class="btn-action">Lancer le dé !</button>
            <p id="message-jeu" class="game-status"></p>
        </div>
    </main>

    <div id="popup-poule" class="popup-overlay hidden">
        <div class="popup-content">
            <div class="poule-emoji">🐔</div>
            <h3>Cot Cot Codet !</h3>
            <p id="popup-texte"></p>
            <button onclick="document.getElementById('popup-poule').classList.add('hidden')" class="btn-action">Super !</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
