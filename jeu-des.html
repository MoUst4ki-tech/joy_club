<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer de Dés - Joy Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-layout">
            <div class="title-group">
                <h1>🎲 Le Lancer de Dés</h1>
                <a href="index.html" style="color: white; text-decoration: none;">← Retour au Club</a>
            </div>
            <div class="wallet-card header-wallet">
                <span class="wallet-label">Wallet :</span>
                <span id="gold-eggs-display" class="wallet-value">100</span>
                <span class="wallet-unit">🥚</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container-focus">
            <h2>Tente ta chance !</h2>
            <p>Fais un <strong>6</strong> pour avoir 6 œufs dorés.</p>
            
            <div id="resultat-de" style="font-size: 6rem; margin: 2rem 0;">❓</div>
            
            <button class="bouton-lancer" onclick="jouerAuDe()" 
                    style="background: var(--accent); border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem;">
                Lancer (1 🥚)
            </button>

            <p id="message-jeu" style="margin-top: 1.5rem; min-height: 1.5em;"></p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        updateDisplay();

        function jouerAuDe() {
            if (userBalance <= 0) {
                document.getElementById('message-jeu').innerText = "Plus d'œufs dorés !";
                return;
            }

            updateBalance(-1);

            let resultat = Math.floor(Math.random() * 6) + 1;
            document.getElementById('resultat-de').innerText = "🎲";

            setTimeout(() => {
                document.getElementById('resultat-de').innerText = resultat;
                const case1 = document.getElementById('case-1');
                
                if (resultat === 6) {
                    document.getElementById('message-jeu').innerHTML = "<strong>GAGNÉ !</strong> Tu as obtenu 6 œufs dorés.";
                    updateBalance(6);
                } else {
                    document.getElementById('message-jeu').innerText = "Dommage...";
                    case1.style.display = "none";
                }
            }, 300);
        }
    </script>
</body>
</html>
