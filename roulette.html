<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roulette du Coq - Joy Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <header>
        <div class="container header-layout">
            <div class="title-group">
                <a href="index.html" class="back-link">← Retour au Club</a>
                <h1>🎰 La Roulette</h1>
            </div>
            <div class="wallet-card header-wallet">
                <span class="wallet-label">Wallet :</span>
                <span id="gold-eggs-display" class="wallet-value">...</span>
                <span class="wallet-unit">🥚</span>
                <button onclick="rechargerFonds()" class="btn-sos">SOS 🏦</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container-focus">
            <div class="wheel-section">
                <div class="roulette-board-wrapper">
                    <div id="real-roulette-wheel" class="real-wheel"></div>
                    <div id="ball-track" class="ball-track">
                        <div class="roulette-ball"></div>
                    </div>
                    <div class="wheel-center">
                        <div id="roulette-result-display" class="result-display-inner">?</div>
                    </div>
                </div>
            </div>
            
            <p id="roulette-message" class="game-status">Faites vos jeux !</p>

            <div class="betting-board">
                <div class="input-group">
                    <label>Mise (🥚) :</label>
                    <input type="number" id="bet-amount" min="1" value="10">
                </div>

                <div class="bet-options">
                    <div class="bet-buttons">
                        <button class="bet-btn btn-red" id="bet-red">ROUGE (x2)</button>
                        <button class="bet-btn btn-black" id="bet-black">NOIR (x2)</button>
                        <div class="number-bet">
                            <button class="bet-btn btn-number" id="bet-number-btn">NUMÉRO (x35)</button>
                            <input type="number" id="bet-number-input" min="0" max="36" placeholder="0-36">
                        </div>
                    </div>
                </div>
            </div>

            <button id="spin-btn" class="btn-action">🎰 TOURNER LA ROUE !</button>
        </div>
    </main>

    <div id="popup-resultat-roulette" class="popup-overlay hidden">
        <div class="popup-content">
            <div id="popup-emoji" class="poule-emoji">🐔</div>
            <h3 id="popup-titre">Résultat</h3>
            <p id="popup-texte-roulette"></p>
            <button onclick="document.getElementById('popup-resultat-roulette').classList.add('hidden')" class="btn-action">Continuer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
