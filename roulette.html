<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roulette du Coq - Joy Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <header>
        <div class="container header-layout">
            <div class="title-group">
                <a href="index.html" class="back-link">← Retour au Club</a>
                <h1>🎰 La Roulette</h1>
            </div>
            <div class="wallet-card header-wallet">
                <span class="wallet-label">Wallet :</span>
                <span id="gold-eggs-display" class="wallet-value">...</span>
                <span class="wallet-unit">🥚</span>
                <button onclick="rechargerFonds()" class="btn-sos">SOS 🏦</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container-focus">
            <div class="wheel-section">
                <div class="roulette-board-wrapper">
                    <div id="real-roulette-wheel" class="real-wheel"></div>
                    <div id="ball-track" class="ball-track">
                        <div class="roulette-ball"></div>
                    </div>
                    <div class="wheel-center">
                        <div id="roulette-result-display" class="result-display-inner">?</div>
                    </div>
                </div>
            </div>
            
            <p id="roulette-message" class="game-status">Faites vos jeux !</p>

            <div class="betting-board">
                <div class="input-group">
                    <label>Mise (🥚) :</label>
                    <input type="number" id="bet-amount" min="1" value="10">
                </div>
                <div class="roulette-table-wrapper" id="roulette-table">
                    <div class="rt-top">
                        <div class="cell rt-zero" data-type="number" data-val="0">0</div>
                        <div class="rt-numbers" id="rt-numbers">
                            </div>
                        <div class="rt-2to1">
                            <div class="cell" data-type="column" data-val="3">2:1</div>
                            <div class="cell" data-type="column" data-val="2">2:1</div>
                            <div class="cell" data-type="column" data-val="1">2:1</div>
                        </div>
                    </div>
                    <div class="rt-dozens">
                        <div class="cell" data-type="dozen" data-val="1">1ère Douzaine</div>
                        <div class="cell" data-type="dozen" data-val="2">2ème Douzaine</div>
                        <div class="cell" data-type="dozen" data-val="3">3ème Douzaine</div>
                    </div>
                    <div class="rt-outside">
                        <div class="cell" data-type="half" data-val="1">1 à 18</div>
                        <div class="cell" data-type="parity" data-val="even">PAIR</div>
                        <div class="cell red" data-type="color" data-val="red">ROUGE</div>
                        <div class="cell black" data-type="color" data-val="black">NOIR</div>
                        <div class="cell" data-type="parity" data-val="odd">IMPAIR</div>
                        <div class="cell" data-type="half" data-val="2">19 à 36</div>
                    </div>
                </div>
                <p id="selected-bet-display" style="color: var(--gold); font-weight: bold; margin-bottom: 1.5rem; text-align: center;">Aucun pari sélectionné</p>
            </div>

            <button id="spin-btn" class="btn-action">🎰 TOURNER LA ROUE !</button>
        </div>
    </main>

    <div id="popup-resultat-roulette" class="popup-overlay hidden">
        <div class="popup-content">
            <div id="popup-emoji" class="poule-emoji">🐔</div>
            <h3 id="popup-titre">Résultat</h3>
            <p id="popup-texte-roulette"></p>
            <button onclick="document.getElementById('popup-resultat-roulette').classList.add('hidden')" class="btn-action">Continuer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
